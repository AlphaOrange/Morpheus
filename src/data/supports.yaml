# Version Requirements for Savegames
# required: which version of Morpheus needs to be supported to run
# fullSupport: which version of Morpheus needs to be supported for all current Morpheus features to work?
---
required: '>=0.4.0'
fullSupport: '>=0.6.0'
features:
  maps: Move durations depend on distance and terrain
  move: Visit different places
  talk: Have conversations with NPCs
