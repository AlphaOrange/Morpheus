# Version Overview
---
features:
  maps: Move durations depend on distance and terrain
  move: Visit different places
  states: Character states change and influence behaviour
  talk: Have conversations with NPCs
  visual: Has images for characters and/or places
versions:
  - version: 0.8.0
    updates: |-
      **States**
      New game concept "states" introduced: characters can have multiple states which values change over time and context-based.

      - Implement states for characters
      - States change based on time passed (and activities like move or sleep)
      - States change based on dialog context
      - Specific state values influence AI character behavior
      - Specific state values trigger character events
      - AI character states reset after a certain time off-screen

      **Sleep and Wake**
      - New feature "Room Actions": Rooms can allow specific additional actions
      - New durational action `sleep`: sleep and regenerate state values for a certain number of minutes
      - New action `wake`: wake someone before sleep period is up
      - AI character also can use `sleep` and `wake`
      - Player Action Bar and AI Character Profiles show sleeping state
      - Sleeping characters cannot act while sleeping

      **Characters**
      - Character Profile Box showing up when clicking player character name in action bar
      - Character description shown in profile box
      - Current state values shown in profile box

      **Books**
      - New parameter for talk duration calculation: `talkDuration`
      - New parameters for move duration calculation: `moveDurationRoom`, `moveDurationLocation`, `moveDurationDestination`
      - New parameter for switching off player character states: `playerCharsHaveStates`

      **Misc**
      - AI characters can now write additional message before leaving a room
      - No longer show system infos when in production
      - Help messages disappear from dialog after a while
      - Improvements to internal character action handling
      - Improvements to AI prompting
      - Rebuild game options system
      - Layout Tweaks

      **Bugfixes**
      - Prevent AI from mistake character's profession for family name
      - Show Room and location ID hints also if only 1 active player character in room
      - Prevent "Currently playing" label from blocking lower buttons in action bar
      - Fix fatal error that appeared when AI decided to not move somewhere after showed intention to move
    features: [maps, move, talk, states]
    fullSupport: 0.8.0
    minSupport: 0.8.0
  - version: 0.7.0
    updates: |-
      **Help Upgrades**
      - add command `--example`
      - add commands `--options` and `set option`
      - show changelog in About view

      **Legal**
      - add privacy policy placeholder
      - require permission for AI data transfer
      - require permission for using local storage

      **Books**
      - new parameter `options` with new book options `minPlayerChars` and `maxPlayerChars`
      - new parameter `description_player` allows for different description in character selection menu

      **Misc**
      - add remove button to all error messages in dialog
      - no longer talk to "all" if there is only one other character
      - can show session's total token count
      - reduce move time between rooms to 0 seconds

      **Bugfixes**
      - fixed issue with scene numbers not correctly restored after load
      - fixed issue with inaccurate version check

      Multiple Layout Tweaks
    features: [maps, move, talk]
    fullSupport: 0.7.0
    minSupport: 0.4.0
  - version: 0.6.0
    updates: |-
      **Changes To Book Files**
      - most attributes are now optional and have fallback values
      - books can now reference image files in their root folder from everywhere
      - books contain list of supported features
      - mind and language attribute merged into behavior which is handled as more imperative
      - background and wants merged into background

      **Other Features**
      - use Google API SDK
      - hide group options if only one player character present

      Multiple Layout Tweaks  
      Multiple Bug Fixes
    features: [maps, move, talk]
    fullSupport: 0.6.0
    minSupport: 0.4.0
  - version: 0.5.0
    updates: |-
      **Layout Changes**
      - newly styled sidebar
      - home page
      - shelf split into library and nightstand views
      - lots of layout and design improvements

      **New Game Features**
      - Automatically generated savegame summaries
      - More control over AI usage via game options

      **Book Changes**
      - new attribute: version
      - new attribute: author

      Multiple Tweaks and Bugfixes
    features: [maps, move, talk]
