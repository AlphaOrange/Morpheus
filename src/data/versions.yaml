  - version: 0.4.0
    updates: |-
      Initial alpha release. This version is the first fully playable, accompanied with a fleshed out example book (interactive story content), although very limited in possible actions. This version supports:
      - Choosing book and characters
      - Visit different places
      - Talk to NPC
      - Save books during play in one single save slot
    features: [maps, move, talk]
    fullSupport: 0.4.0
    minSupport: 0.4.0
